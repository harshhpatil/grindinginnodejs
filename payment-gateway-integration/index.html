<!doctype html>
<html lang="en">
  <head>
    <title>Buy Me a Samosa</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Razorpay Checkout Script -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <!-- styling of the page -->
    <style>
      body {
        font-family: sans-serif;
        text-align: center;
        padding: 50px;
        background: #f4f4f9;
      }
      .card {
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        display: inline-block;
      }
      button {
        background: #3395ff;
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
      }
    </style>
  </head>
  <!-- basic payment card -->
  <body>
    <div class="card">
      <h1>Treat me to a Samosa 🥟</h1>
      <p>Support my coding journey for any amount you wish</p>

      <input
        type="number"
        id="amount"
        placeholder="Enter amount in ₹"
        min="1"
        style="padding: 10px; margin: 10px; width: 200px"
      />
      <br />
      <button id="pay-button">Donate Now</button>
    </div>
  </body>
  <script>
    const button = document.getElementById("pay-button");

    button.addEventListener("click", async () => {
      const amount = document.getElementById("amount").value;

      // returning the user if doesn't enter a valid amount
      if (!amount || amount <= 0) {
        alert("don't bully me, enter a valid amount");
        return;
      }

      // creating a order using the server api route passing the amount to be paid
      const response = await fetch("http://localhost:3000/create-order", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ amount }),
      });

      const order = await response.json(); // getting the order details back from the server

      // options to be passed to the razorpay checkout
      const options = {
        key: "YOUR_RAZORPAY_KEY_ID ", 
        amount: order.amount,
        currency: "INR",
        name: "Buy Me a Samosa",
        description: "Support my coding journey",
        order_id: order.id,
        handler: function (response) {
          alert(
            "Payment successful! Payment ID: " + response.razorpay_payment_id,
          );
          console.log("Payment successful:", response);
        },
        theme: {
          color: "#3395ff",
        },
      };

      // opening the razorpay checkout with the options received from the server
      const rzp = new Razorpay(options);
      rzp.open();
    });
  </script>
</html>
